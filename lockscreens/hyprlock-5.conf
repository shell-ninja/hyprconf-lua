# ============================================================
#  hyprlock Theme 5 — "Side Panel"
#  Left: bold stacked HH / MM clock. Right: avatar + input.
#  A split-panel layout — modern, editorial, asymmetric.
# ============================================================

source = ~/.config/hypr/configs/configs.conf

# ── Background ──────────────────────────────────────────────
background {
    monitor =
    path = $HOME/.config/hypr/.cache/current_wallpaper.png
    blur_passes = 4
    blur_size = 6
    contrast = 0.9
    brightness = 0.7
    vibrancy = 0.15
    vibrancy_darkness = 0.3
}

# ── General ─────────────────────────────────────────────────
general {
    no_fade_in = false
    no_fade_out = false
    grace = 0
    disable_loading_bar = true
}

# ── Left: Hour ───────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H')"
    color = $act_border
    font_size = 180
    font_family = Montserrat ExtraBold
    position = 80, 80
    halign = left
    valign = center
    shadow_passes = 5
    shadow_size = 14
    shadow_color = rgba(0,0,0,0.6)
}

# ── Left: Minute ─────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%M')"
    color = $inact_border
    font_size = 180
    font_family = Montserrat ExtraBold
    position = 80, -120
    halign = left
    valign = center
    shadow_passes = 5
    shadow_size = 14
    shadow_color = rgba(0,0,0,0.6)
}

# ── Left: Date ───────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A')"
    color = $act_border
    font_size = 22
    font_family = Inter SemiBold
    position = 85, -300
    halign = left
    valign = center
    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgba(0,0,0,0.5)
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%d %B %Y')"
    color = $inact_border
    font_size = 18
    font_family = Inter Regular
    position = 85, -338
    halign = left
    valign = center
    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgba(0,0,0,0.5)
}

# ── Right: Avatar ────────────────────────────────────────────
image {
    monitor =
    path = $HOME/.config/hypr/.cache/user.png
    size = 120
    rounding = -1
    border_size = 3
    border_color = $act_border
    rotate = 0
    reload_time = -1
    position = -80, 120
    halign = right
    valign = center
}

# ── Right: Username ──────────────────────────────────────────
label {
    monitor =
    text = $USER
    color = $act_border
    font_size = 22
    font_family = Inter SemiBold
    position = -80, -10
    halign = right
    valign = center
    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgba(0,0,0,0.5)
}

# ── Right: Input Field ───────────────────────────────────────
input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.18
    dots_center = true
    dots_rounding = -1
    outer_color = $act_border
    inner_color = rgba(0,0,0,0.30)
    font_color = $act_border
    fade_on_empty = true
    fade_timeout = 2500
    placeholder_text = <i><span foreground="##aaaaaa">  password</span></i>
    hide_input = false
    rounding = 24
    check_color = $act_border
    fail_color = rgba(220, 60, 60, 1)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 350
    capslock_color = $act_border
    numlock_color = $act_border
    bothlock_color = $act_border
    invert_numlock = false
    swap_font_color = false
    position = -80, -80
    halign = right
    valign = center
}

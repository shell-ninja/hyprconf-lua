# ============================================================
#  hyprlock Theme 15 — "Horizontal Strip"
#  Top strip: ambient clock left, date right.
#  Center: avatar + username.
#  Bottom strip: input field + keyboard layout + battery.
#  A clean, editorial, banner-style layout.
# ============================================================

# variables
source = ~/.config/hypr/configs/configs.conf

$resolve.font=Inter|https://github.com/rsms/inter/releases/download/v4.1/Inter-4.1.zip

# ── Background ──────────────────────────────────────────────
background {
    monitor =
    path = $HOME/.config/hypr/.cache/current_wallpaper.png
    blur_passes = 3
    blur_size = 6
    contrast = 0.9
    brightness = 0.65
    vibrancy = 0.15
    vibrancy_darkness = 0.35
}

# ── General ─────────────────────────────────────────────────
general {
    no_fade_in = false
    no_fade_out = false
    grace = 0
    disable_loading_bar = true
}

# ── Top-left: HH:MM ─────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = $act_border
    font_size = 72
    font_family = Inter ExtraBold
    position = 60, -30
    halign = left
    valign = top
    shadow_passes = 4
    shadow_size = 10
    shadow_color = rgba(0,0,0,0.6)
}

# ── Top-left: Seconds ───────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +':%S')"
    color = $inact_border
    font_size = 28
    font_family = Inter Light
    position = 60, -118
    halign = left
    valign = top
    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgba(0,0,0,0.5)
}

# ── Top-right: Day of week ───────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A')"
    color = $act_border
    font_size = 28
    font_family = Inter SemiBold
    position = -60, -30
    halign = right
    valign = top
    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgba(0,0,0,0.5)
}

# ── Top-right: Full date ─────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%-d %B, %Y')"
    color = $inact_border
    font_size = 18
    font_family = Inter Regular
    position = -60, -80
    halign = right
    valign = top
    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgba(0,0,0,0.5)
}

# ── Top-right: Greeting ──────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "Good $(date +'%H' | awk '{h=$1; if(h<12) print "Morning"; else if(h<18) print "Afternoon"; else print "Evening"}')"
    color = $inact_border
    font_size = 14
    font_family = Inter Light
    position = -60, -112
    halign = right
    valign = top
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0,0,0,0.4)
}

# ── Center: Avatar ───────────────────────────────────────────
image {
    monitor =
    path = $HOME/.config/hypr/.cache/user.png
    size = 110
    rounding = -1
    border_size = 3
    border_color = $act_border
    rotate = 0
    reload_time = -1
    position = 0, 60
    halign = center
    valign = center
}

# ── Center: Username ─────────────────────────────────────────
label {
    monitor =
    text = $USER
    color = $act_border
    font_size = 20
    font_family = Inter SemiBold
    position = 0, -60
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgba(0,0,0,0.5)
}

# ── Bottom: Input Field ──────────────────────────────────────
input-field {
    monitor =
    size = 300, 48
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.18
    dots_center = true
    dots_rounding = -1
    outer_color = $act_border
    inner_color = rgba(0,0,0,0.30)
    font_color = $act_border
    fade_on_empty = true
    fade_timeout = 2500
    placeholder_text = <i><span foreground="##aaaaaa">  password</span></i>
    hide_input = false
    rounding = 24
    check_color = $act_border
    fail_color = rgba(220, 60, 60, 1)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 350
    capslock_color = $act_border
    numlock_color = $act_border
    bothlock_color = $act_border
    invert_numlock = false
    swap_font_color = false
    position = 0, 100
    halign = center
    valign = bottom
}

# ── Bottom: Battery ──────────────────────────────────────────
label {
    monitor =
    text = cmd[update:5000] $BATTERY_ICON
    color = $act_border
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = -1%, 1%
    halign = right
    valign = bottom
}

# ── Bottom: Keyboard Layout ──────────────────────────────────
label {
    monitor =
    text = $LAYOUT
    color = $act_border
    font_size = 20
    font_family = Inter Medium
    position = -2%, 1%
    halign = right
    valign = bottom
}

# ── Bottom-left: Weather ─────────────────────────────────────
label {
    monitor =
    text = cmd[update:18000000] $WEATHER_CMD
    color = $inact_border
    font_size = 14
    font_family = Inter Regular
    position = 1%, 1%
    halign = left
    valign = bottom
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0,0,0,0.4)
}
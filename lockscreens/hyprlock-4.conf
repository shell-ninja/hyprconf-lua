# ============================================================
#  hyprlock Theme 4 — "Minimal Center"
#  Ultra-clean, centered layout. Giant pill-field time display.
#  No Avatar. Pure typographic elegance.
# ============================================================

source = ~/.config/hypr/configs/configs.conf

# ── Background ──────────────────────────────────────────────
background {
    monitor =
    path = $HOME/.config/hypr/.cache/current_wallpaper.png
    blur_passes = 3
    blur_size = 7
    contrast = 0.95
    brightness = 0.75
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# ── General ─────────────────────────────────────────────────
general {
    no_fade_in = false
    no_fade_out = false
    grace = 0
    disable_loading_bar = true
}

# ── Greeting label ──────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "Good $(date +'%H' | awk '{h=$1; if(h<12) print "Morning"; else if(h<18) print "Afternoon"; else print "Evening"}')"
    color = $act_border
    font_size = 18
    font_family = Inter Light
    position = 0, 60
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgba(0,0,0,0.6)
}

# ── Time HH:MM ──────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = $act_border
    font_size = 160
    font_family = Inter ExtraBold
    position = 0, -20
    halign = center
    valign = center
    shadow_passes = 4
    shadow_size = 12
    shadow_color = rgba(0,0,0,0.55)
}

# ── Seconds ─────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +':%S')"
    color = $inact_border
    font_size = 36
    font_family = Inter Light
    position = 0, -150
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgba(0,0,0,0.5)
}

# ── Date ────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B %Y')"
    color = $act_border
    font_size = 20
    font_family = Inter Medium
    position = 0, -200
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgba(0,0,0,0.5)
}

# ── Input Field ─────────────────────────────────────────────
input-field {
    monitor =
    size = 320, 52
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.18
    dots_center = true
    dots_rounding = -1
    outer_color = $act_border
    inner_color = rgba(0,0,0,0.35)
    font_color = $act_border
    fade_on_empty = true
    fade_timeout = 2500
    placeholder_text = <i><span foreground="##aaaaaa">  unlock</span></i>
    hide_input = false
    rounding = 26
    check_color = $act_border
    fail_color = rgba(220, 60, 60, 1)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 350
    capslock_color = $act_border
    numlock_color = $act_border
    bothlock_color = $act_border
    invert_numlock = false
    swap_font_color = false
    position = 0, -290
    halign = center
    valign = center
}

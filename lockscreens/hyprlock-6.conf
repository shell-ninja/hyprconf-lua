# ============================================================
#  hyprlock Theme 6 — "Typographic Corner"
#  Top-left: giant ambient time. Bottom-center: avatar + input.
#  A bold, editorial, magazine-style layout.
# ============================================================

source = ~/.config/hypr/configs/configs.conf

# ── Background ──────────────────────────────────────────────
background {
    monitor =
    path = $HOME/.config/hypr/.cache/current_wallpaper.png
    blur_passes = 2
    blur_size = 5
    contrast = 1.0
    brightness = 0.65
    vibrancy = 0.1
    vibrancy_darkness = 0.4
}

# ── General ─────────────────────────────────────────────────
general {
    no_fade_in = false
    no_fade_out = false
    grace = 0
    disable_loading_bar = true
}

# ── Top-left: Ambient Hour ───────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%I')"
    color = $act_border
    font_size = 260
    font_family = Montserrat Black
    position = 30, -20
    halign = left
    valign = top
    shadow_passes = 6
    shadow_size = 20
    shadow_color = rgba(0,0,0,0.7)
}

# ── Top-left: Separator colon ────────────────────────────────
label {
    monitor =
    text = :
    color = $inact_border
    font_size = 200
    font_family = Montserrat Black
    position = 320, -60
    halign = left
    valign = top
    shadow_passes = 4
    shadow_size = 12
    shadow_color = rgba(0,0,0,0.9)
}

# ── Top-left: Ambient Minute ─────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%M')"
    color = $act_border
    font_size = 260
    font_family = Montserrat Black
    position = 340, -20
    halign = left
    valign = top
    shadow_passes = 6
    shadow_size = 20
    shadow_color = rgba(0,0,0,0.7)
}

# ── Top-left: AM/PM ─────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%p')"
    color = $inact_border
    font_size = 70
    font_family = Montserrat Regular
    position = 700, -267
    halign = left
    valign = top
    shadow_passes = 4
    shadow_size = 10
    shadow_color = rgba(0, 0, 0, 0.75)
}

# ── Top-left: Day of week ────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A')"
    color = $inact_border
    font_size = 28
    font_family = Inter Light
    position = 36, -360
    halign = left
    valign = top
    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgba(0,0,0,0.5)
}

# ── Top-left: Full date ──────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%-d %B, %Y')"
    color = $act_border
    font_size = 20
    font_family = Inter Regular
    position = 36, -400
    halign = left
    valign = top
    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgba(0,0,0,0.5)
}

# ── Bottom-center: Avatar ────────────────────────────────────
image {
    monitor =
    path = $HOME/.config/hypr/.cache/user.png
    size = 100
    rounding = -1
    border_size = 3
    border_color = $act_border
    rotate = 0
    reload_time = -1
    position = 0, 200
    halign = center
    valign = bottom
}

# ── Bottom-center: Username ──────────────────────────────────
label {
    monitor =
    text = $USER
    color = $act_border
    font_size = 20
    font_family = Inter Medium
    position = 0, 155
    halign = center
    valign = bottom
    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgba(0,0,0,0.5)
}

# ── Bottom-center: Input Field ───────────────────────────────
input-field {
    monitor =
    size = 300, 48
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.18
    dots_center = true
    dots_rounding = -1
    outer_color = $act_border
    inner_color = rgba(0,0,0,0.30)
    font_color = $act_border
    fade_on_empty = true
    fade_timeout = 2500
    placeholder_text = <i><span foreground="##aaaaaa">  password</span></i>
    hide_input = false
    rounding = 24
    check_color = $act_border
    fail_color = rgba(220, 60, 60, 1)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 350
    capslock_color = $act_border
    numlock_color = $act_border
    bothlock_color = $act_border
    invert_numlock = false
    swap_font_color = false
    position = 0, 90
    halign = center
    valign = bottom
}
